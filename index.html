<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fence Tape Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --diamond-size: 48px;
      --wire-color: #8a9199;
      --empty-color: #dde3e8;
      --header-bg: #3d6b4f;
      --header-bg2: #2f5340;
      --palette-bg: #f5efe6;
      --ui-text: #3a2e24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--wire-color);
      font-family: 'Nunito', system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    #header {
      background: var(--header-bg);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      flex-shrink: 0;
      height: 52px;
      border-bottom: 3px solid var(--header-bg2);
    }
    #site-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.35rem;
      color: #e8f4e8;
      white-space: nowrap;
      letter-spacing: 0.01em;
      margin-right: 4px;
    }
    #header label { white-space: nowrap; color: #c8e6c8; font-size: 0.82rem; font-weight: 600; }
    #colsSlider {
      flex: 1;
      max-width: 180px;
      accent-color: #a8d5a2;
      cursor: pointer;
    }
    #colsDisplay { min-width: 28px; font-variant-numeric: tabular-nums; color: #c8e6c8; font-size: 0.82rem; }

    .tb-btn {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      color: #e8f4e8;
      padding: 4px 12px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.6); }
    #shareBtn { margin-left: auto; }
    #copiedMsg {
      font-size: 0.75rem;
      color: #a8d5a2;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      font-weight: 700;
    }
    #copiedMsg.show { opacity: 1; }

    /* ── Palette bar ── */
    #palette-bar {
      background: var(--palette-bg);
      display: flex;
      align-items: flex-start;
      padding: 8px 14px;
      flex-shrink: 0;
      border-bottom: 2px solid #ddd0c4;
      overflow-x: auto;
      gap: 4px;
    }
    #palette-bar::-webkit-scrollbar { height: 4px; }
    #palette-bar::-webkit-scrollbar-thumb { background: #c8b8a8; border-radius: 2px; }

    .swatch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 3px 4px 4px;
      border-radius: 6px;
      border: 2px solid transparent;
      transition: border-color 0.12s, background 0.12s;
    }
    .swatch-wrap:hover { background: rgba(0,0,0,0.06); }
    .swatch-wrap.active {
      border-color: #3d6b4f;
      background: rgba(61,107,79,0.1);
    }
    .swatch {
      width: 26px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .swatch-name {
      font-size: 10px;
      color: #7a6a5a;
      text-align: center;
      line-height: 1.25;
      max-width: 46px;
      word-break: break-word;
      font-weight: 600;
    }
    .swatch-wrap.active .swatch-name { color: #2f5340; }

    /* ── Directions strip ── */
    #directions {
      background: #eaf3eb;
      border-bottom: 1px solid #c8ddc8;
      padding: 5px 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .dir-step {
      font-size: 0.75rem;
      color: #3a5a3a;
      font-weight: 600;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dir-step .num {
      background: #3d6b4f;
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .dir-sep {
      color: #b0c8b0;
      font-size: 0.9rem;
    }

    /* ── Fence grid container ── */
    #fence-container {
      flex: 1;
      overflow: auto;
      background: var(--wire-color);
      padding: calc(var(--diamond-size) * 0.6);
      cursor: pointer;
      touch-action: none;
    }

    /* ── Diamond rows ── */
    .diamond-row {
      display: flex;
      margin-bottom: calc(var(--diamond-size) * -0.5);
      position: relative;
    }
    .diamond-row:last-child { margin-bottom: 0; }
    .diamond-row.offset { padding-left: calc(var(--diamond-size) * 0.5); }

    /* Full square = click target. Visual shape is on the child. */
    .diamond-cell {
      width: var(--diamond-size);
      height: var(--diamond-size);
      flex-shrink: 0;
    }
    .diamond-visual {
      width: 100%;
      height: 100%;
      clip-path: polygon(50% 5%, 95% 50%, 50% 95%, 5% 50%);
      background: var(--empty-color);
      pointer-events: none;
    }
    .diamond-cell:hover .diamond-visual { filter: brightness(1.12); }
  </style>
</head>
<body>

  <div id="header">
    <span id="site-title">Fence Tape Designer</span>
    <label for="colsSlider">Columns:</label>
    <input type="range" id="colsSlider" min="10" max="225" value="36">
    <span id="colsDisplay">36</span>
    <button class="tb-btn" id="shareBtn">Copy Link</button>
    <span id="copiedMsg">Copied!</span>
    <button class="tb-btn" id="downloadBtn">Download PNG</button>
    <button class="tb-btn" id="clearBtn">Clear</button>
  </div>

  <div id="palette-bar"></div>

  <div id="directions">
    <div class="dir-step"><span class="num">1</span> Pick a color from the palette</div>
    <span class="dir-sep">·</span>
    <div class="dir-step"><span class="num">2</span> Click or drag to fill diamonds</div>
    <span class="dir-sep">·</span>
    <div class="dir-step"><span class="num">3</span> Set columns to match your fence width (up to 225)</div>
    <span class="dir-sep">·</span>
    <div class="dir-step"><span class="num">4</span> Copy Link to share, or Download PNG to save</div>
  </div>

  <div id="fence-container"></div>

  <script>
    const PALETTE = [
      { name: 'White',         hex: '#FFFFFF' },
      { name: 'Silver',        hex: '#A2A4AF' },
      { name: 'Black',         hex: '#2B2B29' },
      { name: 'Pink',          hex: '#F18AC4' },
      { name: 'Stop Sign Red', hex: '#B3262F' },
      { name: 'Redwood',       hex: '#763931' },
      { name: 'Orange',        hex: '#E96836' },
      { name: 'Creamy Buff',   hex: '#ECD990' },
      { name: 'Yellow',        hex: '#E9CB41' },
      { name: 'Green',         hex: '#1E7C48' },
      { name: 'Aqua',          hex: '#63BAC0' },
      { name: 'Light Blue',    hex: '#85ADE5' },
      { name: 'Royal Blue',    hex: '#30498C' },
      { name: 'Purple',        hex: '#523377' },
      { name: 'Brown',         hex: '#5F5052' },
      { name: 'Tan',           hex: '#B59C81' },
    ];

    const state = {
      rows: 20,
      cols: 36,
      cellColors: {},
      activeColor: PALETTE[0].hex,
      isPainting: false,
    };

    const fenceContainer = document.getElementById('fence-container');
    const paletteBar     = document.getElementById('palette-bar');
    const colsSlider     = document.getElementById('colsSlider');
    const colsDisplay    = document.getElementById('colsDisplay');
    const shareBtn       = document.getElementById('shareBtn');
    const copiedMsg      = document.getElementById('copiedMsg');
    const downloadBtn    = document.getElementById('downloadBtn');
    const clearBtn       = document.getElementById('clearBtn');

    // ── URL encode / decode ───────────────────────────────────────────────

    function encodeState() {
      let cells = '';
      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          const color = state.cellColors[r + ',' + c];
          if (!color) { cells += '0'; continue; }
          const idx = PALETTE.findIndex(p => p.hex.toUpperCase() === color.toUpperCase());
          if (idx === -1) { cells += '0'; continue; }
          const code = idx + 1;
          cells += code < 10 ? String(code) : String.fromCharCode(87 + code);
        }
      }
      return state.cols + '/' + cells.replace(/0+$/, '');
    }

    function decodeState(hash) {
      const str = hash.replace(/^#/, '');
      const slash = str.indexOf('/');
      if (slash === -1) return false;
      const cols = parseInt(str.slice(0, slash), 10);
      if (isNaN(cols) || cols < 1 || cols > 225) return false;
      const cells = str.slice(slash + 1);

      state.cols = cols;
      colsSlider.value = cols;
      colsDisplay.textContent = cols;
      state.cellColors = {};

      let i = 0;
      outer: for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++, i++) {
          if (i >= cells.length) break outer;
          const ch = cells[i];
          if (ch === '0') continue;
          let idx;
          if (ch >= '1' && ch <= '9') idx = parseInt(ch, 10) - 1;
          else if (ch >= 'a' && ch <= 'g') idx = ch.charCodeAt(0) - 88;
          else continue;
          if (PALETTE[idx]) state.cellColors[r + ',' + c] = PALETTE[idx].hex;
        }
      }
      return true;
    }

    function updateURL() {
      history.replaceState(null, '', '#' + encodeState());
    }

    // ── Grid ──────────────────────────────────────────────────────────────
    // D must match --diamond-size. PAD must match the fence-container padding multiplier.
    const D   = 48;
    const PAD = Math.round(D * 0.6);
    const cellEls = {}; // "r,c" → .diamond-cell DOM element for fast paint lookup

    function buildGrid() {
      fenceContainer.innerHTML = '';
      Object.keys(cellEls).forEach(k => delete cellEls[k]);
      for (let r = 0; r < state.rows; r++) {
        const row = document.createElement('div');
        row.className = 'diamond-row' + (r % 2 === 1 ? ' offset' : '');
        for (let c = 0; c < state.cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'diamond-cell';
          const visual = document.createElement('div');
          visual.className = 'diamond-visual';
          const saved = state.cellColors[r + ',' + c];
          if (saved) visual.style.background = saved;
          cell.appendChild(visual);
          row.appendChild(cell);
          cellEls[r + ',' + c] = cell;
        }
        fenceContainer.appendChild(row);
      }
    }

    // Find & paint the nearest diamond to (clientX, clientY) using Manhattan distance,
    // which is the natural metric for a diamond/rhombus shape.
    // Only paints if the point is within the visible diamond (threshold = 45% of D).
    function paintAt(clientX, clientY) {
      const rect = fenceContainer.getBoundingClientRect();
      const px   = clientX - rect.left + fenceContainer.scrollLeft;
      const py   = clientY - rect.top  + fenceContainer.scrollTop;

      // Rough row estimate, then check ±2 rows to handle the stagger overlap
      const rowEst = Math.round((py - PAD - D / 2) / (D / 2));
      let best = null, bestDist = Infinity;

      for (let dr = -2; dr <= 2; dr++) {
        const r = rowEst + dr;
        if (r < 0 || r >= state.rows) continue;
        const cy   = PAD + r * (D / 2) + D / 2;
        const xOff = PAD + (r % 2 === 1 ? D / 2 : 0);
        const colEst = Math.round((px - xOff - D / 2) / D);
        for (let dc = -1; dc <= 1; dc++) {
          const c = colEst + dc;
          if (c < 0 || c >= state.cols) continue;
          const cx   = xOff + c * D + D / 2;
          const dist = Math.abs(px - cx) + Math.abs(py - cy); // Manhattan = diamond metric
          if (dist < bestDist) { bestDist = dist; best = { r, c }; }
        }
      }

      // Threshold: 45% of D keeps us inside the visual diamond (5% inset clip-path → 45% radius)
      if (!best || bestDist > D * 0.45) return;

      const key = best.r + ',' + best.c;
      if (state.cellColors[key] === state.activeColor) return; // no-op if already this color
      state.cellColors[key] = state.activeColor;
      const el = cellEls[key];
      if (el) el.firstChild.style.background = state.activeColor;
    }

    function clearGrid() {
      state.cellColors = {};
      Object.values(cellEls).forEach(el => { el.firstChild.style.background = ''; });
      updateURL();
    }

    // ── Palette ───────────────────────────────────────────────────────────

    function renderPalette() {
      paletteBar.innerHTML = '';
      PALETTE.forEach(({ name, hex }) => {
        const wrap = document.createElement('div');
        wrap.className = 'swatch-wrap' + (hex === state.activeColor ? ' active' : '');

        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.background = hex;

        const label = document.createElement('div');
        label.className = 'swatch-name';
        label.textContent = name;

        wrap.append(sw, label);
        wrap.addEventListener('click', () => {
          state.activeColor = hex;
          document.querySelectorAll('.swatch-wrap').forEach(w => w.classList.remove('active'));
          wrap.classList.add('active');
        });
        paletteBar.appendChild(wrap);
      });
    }

    // ── PNG download ──────────────────────────────────────────────────────

    function downloadPNG() {
      const D = 20;
      const PAD = Math.round(D * 0.6);
      const inset = D * 0.08;
      const hw = D / 2 - inset;
      const hh = D / 2 - inset;

      const canvas = document.createElement('canvas');
      canvas.width  = Math.ceil(PAD + state.cols * D + D / 2 + PAD);
      canvas.height = Math.ceil(PAD + (state.rows - 1) * (D / 2) + D + PAD);
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#8a9199';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let r = 0; r < state.rows; r++) {
        const xOff = PAD + (r % 2 === 1 ? D / 2 : 0);
        const yOff = PAD + r * (D / 2);
        for (let c = 0; c < state.cols; c++) {
          const color = state.cellColors[r + ',' + c] || '#dde3e8';
          const cx = xOff + c * D + D / 2;
          const cy = yOff + D / 2;
          ctx.beginPath();
          ctx.moveTo(cx,      cy - hh);
          ctx.lineTo(cx + hw, cy);
          ctx.lineTo(cx,      cy + hh);
          ctx.lineTo(cx - hw, cy);
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.fill();
        }
      }

      const a = document.createElement('a');
      a.download = 'fence-design.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    // ── Drag-to-paint (geometry-based, no elementFromPoint) ──────────────

    fenceContainer.addEventListener('pointerdown', e => {
      if (!state.activeColor) return;
      e.preventDefault();
      state.isPainting = true;
      fenceContainer.setPointerCapture(e.pointerId);
      paintAt(e.clientX, e.clientY);
    });

    fenceContainer.addEventListener('pointermove', e => {
      if (!state.isPainting) return;
      paintAt(e.clientX, e.clientY);
    });

    fenceContainer.addEventListener('pointerup', () => {
      if (state.isPainting) { state.isPainting = false; updateURL(); }
    });
    fenceContainer.addEventListener('pointercancel', () => { state.isPainting = false; });

    // ── Controls ──────────────────────────────────────────────────────────

    colsSlider.addEventListener('input', () => {
      state.cols = parseInt(colsSlider.value, 10);
      colsDisplay.textContent = state.cols;
      buildGrid();
      updateURL();
    });

    clearBtn.addEventListener('click', clearGrid);
    downloadBtn.addEventListener('click', downloadPNG);

    shareBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        copiedMsg.classList.add('show');
        setTimeout(() => copiedMsg.classList.remove('show'), 2000);
      });
    });

    // ── Init ──────────────────────────────────────────────────────────────

    if (window.location.hash) decodeState(window.location.hash);
    renderPalette();
    buildGrid();
  </script>
</body>
</html>
